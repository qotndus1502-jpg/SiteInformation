# nginx.docker.conf — central ingress for *.axworks.app
#
# Per-site server blocks live in /etc/nginx/sites/*.conf
# (mounted from ./deploy/nginx.sites/ via docker-compose).

upstream web_upstream {
    server web:3000;
}

upstream backend_upstream {
    server backend:8001;
}

# Common SSL — shared by every per-site server block.
ssl_certificate     /etc/nginx/ssl/fullchain.crt;
ssl_certificate_key /etc/nginx/ssl/axworks_app.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

# HTTP catch-all — every *.axworks.app gets redirected to HTTPS.
# (`.app` TLD is HSTS preloaded so this rarely fires from browsers,
#  but we still answer 80 for ACME challenges and curl checks.)
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Per-site HTTPS server blocks.
include /etc/nginx/sites/*.conf;

# Fallback for HTTPS requests with no matching server_name (e.g. raw IP access).
# Using the wildcard cert here will produce a hostname-mismatch warning, which
# is the desired behavior — discourage random-IP HTTPS traffic.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;
    return 444;
}
